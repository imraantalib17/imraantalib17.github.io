<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://raw.githubusercontent.com/JaKooLit/Wallpaper-Bank/refs/heads/main/wallpapers/Courtside-Sunset.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.8s ease-out;
        }

        .error-code {
            font-size: 5rem;
            color: #ff6b6b;
            font-weight: 900;
            margin: 0.5rem 0;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
            animation: bounce 1s ease-out 0.3s both;
        }

        p {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-top: 1.5rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-in 0.6s both;
        }

        .button-container {
            margin-top: 2.5rem;
            animation: fadeIn 1s ease-in 0.8s both;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            margin: 0 10px;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .home-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .error-code {
                font-size: 4rem;
            }

            p {
                font-size: 1rem;
            }

            a {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Page Not Found</h1>
        <div class="error-code">404</div>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <div class="button-container">
            <a href="/" class="home-btn">← Go Home</a>
        </div>
    </div>
</body>
</html>
