<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Spinner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .book-spinner {
            width: 200px;
            height: 250px;
            perspective: 1000px;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: spin 4s infinite linear;
        }

        @keyframes spin {
            0% {
                transform: rotateY(0deg) rotateX(0deg);
            }
            100% {
                transform: rotateY(360deg) rotateX(10deg);
            }
        }

        .book-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            backface-visibility: hidden;
        }

        .front {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            transform: translateZ(50px);
        }

        .back {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            transform: rotateY(180deg) translateZ(50px);
        }

        .right {
            background: linear-gradient(135deg, #f9ca24 0%, #f0932b 100%);
            width: 100px;
            transform: rotateY(90deg) translateZ(50px);
            position: absolute;
            right: 0;
            height: 100%;
        }

        .left {
            background: linear-gradient(135deg, #6c5ce7 0%, #5f3dc4 100%);
            width: 100px;
            transform: rotateY(-90deg) translateZ(50px);
            position: absolute;
            left: 0;
            height: 100%;
        }

        .top {
            background: linear-gradient(135deg, #a29bfe 0%, #74b9ff 100%);
            height: 100px;
            transform: rotateX(90deg) translateZ(50px);
            position: absolute;
            top: 0;
            width: 100%;
        }

        .bottom {
            background: linear-gradient(135deg, #fd79a8 0%, #fdcb6e 100%);
            height: 100px;
            transform: rotateX(-90deg) translateZ(50px);
            position: absolute;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="book-spinner">
        <div class="book">
            <div class="book-face front">📖</div>
            <div class="book-face back"></div>
            <div class="book-face right"></div>
            <div class="book-face left"></div>
            <div class="book-face top"></div>
            <div class="book-face bottom"></div>
        </div>
    </div>
</body>
</html>
